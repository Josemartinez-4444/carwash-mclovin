{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Wash McLovin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<div class="sidebar">

    <div class="logo">
        <h2>🚗 McLovin</h2>
        <p>Car Wash Premium</p>
    </div>

    <ul>
        <li><i class="fa-solid fa-chart-line"></i> Dashboard</li>
        <li><i class="fa-solid fa-users"></i> Clientes</li>
        <li><i class="fa-solid fa-car"></i> Servicios</li>
        <li><i class="fa-solid fa-money-bill"></i> Ingresos</li>
    </ul>

</div>

<div class="content">

    <h1>Dashboard</h1>
    <p>Bienvenido al sistema Car Wash McLovin 🚗💦</p>

    <div class="row mt-4">

        <div class="col-md-4">
            <div class="card-box">
                <h3>25</h3>
                <p>Autos Lavados</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box">
                <h3>$250</h3>
                <p>Ganancias del Día</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box">
                <h3>8</h3>
                <p>Clientes Nuevos</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
