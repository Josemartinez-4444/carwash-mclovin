{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | McLovin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<div class="login-container">

    <div class="login-box">

        <h1>🚗 McLovin</h1>
        <p>Car Wash Premium</p>
        {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <input type="text"
                class="form-control"
                placeholder="Usuario"
                name="username">
            </div>

            <div class="mb-3">
                <input type="password"
                class="form-control"
                placeholder="Contraseña"
                name="password">
            </div>

            <button class="btn-login">
                Iniciar Sesión
            </button>

        </form>

    </div>

</div>

</body>
</html>
